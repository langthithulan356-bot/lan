<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郎氏秋蘭 | 專業個人簡介</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f3f2ef;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 850px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .banner {
            height: 160px;
            background: linear-gradient(to right, #0a66c2, #004182);
        }

        .profile-header {
            padding: 0 24px 24px;
            position: relative;
        }

        .profile-picture {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 4px solid white;
            position: absolute;
            top: -76px;
            background-color: #fff;
            object-fit: cover;
        }

        .header-content {
            margin-top: 85px;
        }

        h1 { margin: 0; font-size: 26px; color: #000; }
        .headline { font-size: 18px; color: #666; margin: 8px 0; }
        .location { font-size: 14px; color: #888; margin-top: 8px; }

        section {
            padding: 24px;
            border-top: 1px solid #ebebeb;
        }

        h2 {
            font-size: 20px;
            color: #000;
            margin-bottom: 16px;
        }

        .item { margin-bottom: 20px; }
        .item-title { font-weight: bold; margin: 0; font-size: 16px; }
        .item-subtitle { color: #666; font-size: 14px; margin: 2px 0; }
        .item-desc { font-size: 14px; margin-top: 8px; color: #444; }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background: #e7f3ff;
            color: #0a66c2;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #0a66c2;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner"></div>

    <header class="profile-header">
        <img src="images/music.jpg?auto=format&fit=crop&q=80&w=256&h=256" alt="郎氏秋蘭 Profile Picture" class="profile-picture">
        
        <div class="header-content">
            <h1>郎氏秋蘭</h1>
            <p class="headline">專業職稱 | 致力於解決 [某領域] 問題的專家</p>
            <p class="location">台灣 · 台北市</p>
        </div>
    </header>

    <section>
        <h2>關於 (About)</h2>
        <p class="item-desc">
            我是郎氏秋蘭，擁有跨文化溝通背景，專注於 [妳的專業領域]。我擅長 [技能 A] 與 [技能 B]，並能協助團隊在 [某種情境] 下達成最佳成效。
        </p>
    </section>

    <section>
        <h2>核心技能 (Skills)</h2>
        <div class="skills-container">
            <span class="skill-tag">中越雙語溝通</span>
            <span class="skill-tag">HTML/CSS 基礎</span>
            <span class="skill-tag">AI 工具應用</span>
            <span class="skill-tag">專案執行力</span>
        </div>
    </section>

    <section>
        <h2>學歷與證照</h2>
        <div class="item">
            <p class="item-title">[某某大學] · [某某科系]</p>
            <p class="item-subtitle">[畢業年份]</p>
        </div>
    </section>
</div>

<footer>
    © 2026 郎氏秋蘭 - 專業個人簡介
</footer>

</body>
</html>

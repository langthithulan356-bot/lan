<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郎氏秋蘭 - 個人專業頁面</title>
    <style>
        :root {
            --linkedin-blue: #0a66c2;
            --bg-gray: #f3f2ef;
            --text-dark: #1d1d1d;
            --text-gray: #666666;
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Header Section */
        header {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .banner {
            height: 180px;
            background: linear-gradient(135deg, #0a66c2 0%, #004182 100%);
        }

        .profile-content {
            padding: 0 24px 24px 24px;
            position: relative;
        }

        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            position: absolute;
            top: -75px;
            background-color: #fff;
        }

        .info {
            margin-top: 85px;
        }

        h1 { margin: 0; font-size: 26px; }
        .headline { font-size: 18px; color: var(--text-dark); margin: 8px 0; font-weight: 500; }
        .school-info { font-size: 15px; color: var(--text-gray); margin-bottom: 5px; }

        /* Section Universal Style */
        section {
            background: white;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        h2 { font-size: 20px; margin-top: 0; border-bottom: 1px solid #eeeeee; padding-bottom: 12px; color: var(--linkedin-blue); }
        
        .experience-item {
            margin-bottom: 15px;
        }

        .item-title { font-weight: bold; font-size: 17px; }
        .item-subtitle { color: var(--text-gray); font-size: 14px; margin-top: 4px; }
        
        .quote {
            font-style: italic;
            color: var(--linkedin-blue);
            background: #f0f7fe;
            padding: 15px;
            border-left: 5px solid var(--linkedin-blue);
            margin: 10px 0;
            font-weight: bold;
        }

        .skills-tag {
            display: inline-block;
            background: #eef3f8;
            color: var(--linkedin-blue);
            padding: 8px 16px;
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
